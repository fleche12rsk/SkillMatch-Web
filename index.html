<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMatch Web</title>
    <meta name="description" content="A simple HTML document">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@300&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/95156858fe.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="assets/styles/style.css">
    <script type="module" src="assets/scripts/main.js"></script>
</head>
<body>
    <header id="navbar">
        <a href="#inicio" id="nav-tittle"><span id="nav-tittle-s">S</span><span>killMatch</span></a>
        <nav id="nav-pc">
            <ul id="nav-list">
                <li><a href="#formulario_candidato">Formulário</a></li>
                <li><a href="#resultado_vaga">Vagas</a></li>
            </ul>
        </nav>

        <div id="nav-cel-container">
            <nav id="nav-cel">
                <ul id="nav-list">
                    <li><a href="#formulario_candidato">Formulário</a></li>
                    <li><a href="#resultado_vaga">Vagas</a></li>
                </ul>
            </nav>
            <button id="nav-btn" class="btn" hidden><i class="fa-solid fa-bars"></i></button>
        </div>

    </header>


    <main id="main">
        <span>teste</span>
    </main>


    <section id="formulario_candidato">
        <form action="" id="formulario">
            <label for="name">Nome:</label>
            <input type="text" id="name" required>
            <br>
            <label for="areas">Área:</label>
            <div id="area-chekbox">
                <!--Áreas-->
                <label><input  type="checkbox" name="areas" value="front-end"> Front-end</label><br>
                <label><input  type="checkbox" name="areas" value="back-end"> Back-end</label><br>
                <label><input  type="checkbox" name="areas" value="fullstack"> Fullstack</label><br>
                <label><input  type="checkbox" name="areas" value="ui-ux-design"> UI/UX Design</label><br>
                <label><input  type="checkbox" name="areas" value="mobile"> Mobile</label><br>
                <label><input  type="checkbox" name="areas" value="qa"> QA Testes</label><br>
            </div>
            <br>
            <label for="habilidades">Habilidades:</label>
            <div id="habilidades-chekbox">
                <!--Habilidades-->
                <label><input  type="checkbox" name="habilidades" value="html"> HTML</label><br>
                <label><input  type="checkbox" name="habilidades" value="css"> CSS</label><br>
                <label><input  type="checkbox" name="habilidades" value="javascript"> JavaScript</label><br>
                <label><input  type="checkbox" name="habilidades" value="git"> Git</label><br>
                <label><input  type="checkbox" name="habilidades" value="flexbox"> FlexBox</label><br>
                <label><input  type="checkbox" name="habilidades" value="responsividade"> Responsividade</label><br>
                <label><input  type="checkbox" name="habilidades" value="bootstrap"> BootStrap</label><br>
                <label><input  type="checkbox" name="habilidades" value="sass"> Sass</label><br>
                <label><input  type="checkbox" name="habilidades" value="dom"> DOM</label><br>
                <label><input  type="checkbox" name="habilidades" value="fetch-api"> Fetch/API</label><br>
                <label><input  type="checkbox" name="habilidades" value="es6"> ES6</label><br>
                <label><input  type="checkbox" name="habilidades" value="async-await"> Async/Await</label><br>
                <label><input  type="checkbox" name="habilidades" value="npm"> npm</label><br>
                <label><input  type="checkbox" name="habilidades" value="figma"> Figma</label><br>
                <label><input  type="checkbox" name="habilidades" value="acessibilidade"> Acessibilidade</label><br>
                <label><input  type="checkbox" name="habilidades" value="seo"> SEO</label>
                <label><input  type="checkbox" name="habilidades" value="node"> Node.js</label>
                <label><input  type="checkbox" name="habilidades" value="express"> Express</label>
                <label><input  type="checkbox" name="habilidades" value="sql"> SQL</label>
                <label><input  type="checkbox" name="habilidades" value="mongodb"> MongoDB</label>
                <label><input  type="checkbox" name="habilidades" value="api-rest"> API REST</label>
                <label><input  type="checkbox" name="habilidades" value="python"> Python</label>
                <label><input  type="checkbox" name="habilidades" value="java"> Java</label>
                <label><input  type="checkbox" name="habilidades" value="php"> PHP</label>
            </div>
            <br>
            <label for="experiencia">Meses de experiência:</label>
            <input type="number" id="experiencia">
            <button type="submit" id="enviar">Verificar vagas</button>
        </form>
    </section>


    <section id="resultado_vaga">
        <div class="vaga-card">
            
        </div>
    </section>


    <footer id="footer">
        <div>
            <p>©2026 <a href="https://micio.dev">Mauricio Renato Sardá Filho</a> Todos os direitos reservados</p>
        </div>
    </footer>
</body>
</html>

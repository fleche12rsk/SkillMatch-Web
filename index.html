<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@300&display=swap" rel="stylesheet">

<body>
    <header id="navbar">
        <a href="#inicio"><span id="nav-tittle">S</span><span>killMatch</span></a>

            <ul id="nav-list">
                <li><a href="#formulario_candidato">Formulário</a></li>
                <li><a href="#resultado_vaga">Vagas</a></li>
            </ul>
        </nav>
        <button id="nav-menu" class="btn" hidden>fdfg</button>
    </header>


    <main id="main">
        <span>teste</span>
    </main>


    <section id="formulario_candidato">
        <form action="" id="formulario">
            <label for="name">Nome:</label>
            <input type="text">
            <br>
            <label for="area">Área:</label>
            <input type="text">
            <br>
            <label for="habilidades">Habilidades:</label>
            <select name="tipos-de-habilidades" id="tipos_habilidades" multiple>
                <!--Vagas Habilidades-->>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="javascript">JavaScript</option>
                <option value="git">Git</option>
                <option value="flexbox">FlexBox</option>
                <option value="responsividade">Responsividade</option>
                <option value="bootstrap">BootStrap</option>
                <option value="sass">Sass</option>
                <option value="dom">DOM</option>
                <option value="fetch-api">Fetch/API</option>
                <option value="es6">ES6</option>
                <option value="async-await">Async/Await</option>
                <option value="npm">npm</option>
                <option value="figma">Figma</option>
                <option value="acessibilidade">Acessibilidade</option>
                <option value="seo">SEO</option>
            </select>
            <br>
            <button type="submit">Verificar vagas</button>
        </form>
    </section>
